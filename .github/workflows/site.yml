name: Scrape, Resolve Servers, and Deploy Site

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: pip install -r requirements.txt
      - name: Generate catalog dumps with server resolution
        run: |
          python -m scripts.dump_animewitcher --resolve-servers
          python -m scripts.dump_asia2tv --limit 500 --resolve-servers
        # Since our project isn't inside a `web` directory, we adapt paths
      - run: |
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
